# WNAR-SW Clinical Severity Weights
# Format: ITEM_NAME=weight  (0.0 to 1.0)
# These override/extend the built-in severity table in WNARSW.java
# Side-effect names are normalized: uppercase, non-alphanumeric -> underscore
#
# Uncomment and modify any lines below to customize weights.

# ---- Critical (0.90 - 1.00) ----
# SEIZURES=1.00
# HEART_ATTACK=1.00
# LIVER_FAILURE=0.95

# ---- Severe (0.65 - 0.89) ----
# BLEEDING=0.85
# CHEST_PAIN=0.85

# ---- Moderate (0.40 - 0.64) ----
# VOMITING=0.60
# DIARRHEA=0.55

# ---- Mild (0.10 - 0.39) ----
# HEADACHE=0.30
# NAUSEA=0.35
